<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <title>Dashboard Kerja Borongan Arief</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>

    <style>
      * {
        box-sizing: border-box;
      }
      body {
        font-family: "Segoe UI", sans-serif;
        background: #f4f6f8;
        padding: 12px;
      }
      .container {
        max-width: 1100px;
        margin: auto;
        background: #fff;
        padding: 16px;
        border-radius: 14px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      }
      h1 {
        text-align: center;
        color: #1e3c72;
        margin-bottom: 20px;
      }

      .form {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 10px;
      }
      .form input,
      .form select,
      .form button {
        padding: 12px;
        border-radius: 10px;
        border: 1px solid #ccc;
        outline: none;
      }
      .form button {
        background: #1e3c72;
        color: #fff;
        font-weight: bold;
        cursor: pointer;
        border: none;
        transition: 0.3s;
      }
      .form button:hover {
        background: #2a5298;
      }

      .table-wrapper {
        max-height: 400px;
        overflow: auto;
        margin-top: 15px;
        border: 1px solid #ccc;
        border-radius: 10px;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        min-width: 520px;
      }
      thead th {
        position: sticky;
        top: 0;
        background: #1e3c72;
        color: #fff;
        padding: 12px;
        font-size: 13px;
        z-index: 10;
      }
      td {
        padding: 10px;
        font-size: 12px;
        text-align: center;
        border-bottom: 1px solid #eee;
      }

      .tanggal-row {
        background: #eef3ff;
        font-weight: bold;
        text-align: left;
      }
      .tanggal-row td {
        text-align: left;
        padding-left: 15px;
        color: #1e3c72;
      }
      .total-harian {
        background: #fafafa;
        font-weight: bold;
        color: #27ae60;
      }

      #tfootTotal {
        display: none;
        background: #e9f7ef;
        font-weight: bold;
      }

      .btn-del {
        background: #e74c3c;
        color: #fff;
        border: none;
        padding: 6px 12px;
        border-radius: 6px;
        cursor: pointer;
      }
      .btn {
        width: 100%;
        padding: 14px;
        margin-top: 12px;
        border: none;
        border-radius: 12px;
        font-weight: bold;
        cursor: pointer;
        transition: 0.3s;
      }
      .btn-total {
        background: #0c7c59;
        color: #fff;
      }
      .btn-pdf {
        background: #34495e;
        color: #fff;
      }
      .btn-hapus {
        background: #c0392b;
        color: #fff;
      }
      .btn:hover {
        opacity: 0.9;
        transform: translateY(-1px);
      }

      @media (max-width: 900px) {
        .form {
          grid-template-columns: repeat(2, 1fr);
        }
      }
      @media (max-width: 600px) {
        .form {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h1>📊 Dashboard Kerja Borongan</h1>

      <div class="form">
        <input type="date" id="tanggal" />
        <select id="ukuran">
          <option value="">Pilih Ukuran</option>
          <option data-harga="10.5">45–54 cm</option>
          <option data-harga="11.4">55–64 cm</option>
          <option data-harga="12.6">65–74 cm</option>
          <option data-harga="13.6">75–84 cm</option>
          <option data-harga="17">85–94 cm</option>
        </select>
        <input type="number" id="hasil" placeholder="Jumlah" />
        <button onclick="tambah()">Tambah Data</button>
      </div>

      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>Ukuran</th>
              <th>Harga</th>
              <th>Jumlah</th>
              <th>Total</th>
              <th>Aksi</th>
            </tr>
          </thead>
          <tbody id="tabel"></tbody>
          <tfoot id="tfootTotal">
            <tr>
              <td colspan="3">TOTAL KESELURUHAN</td>
              <td id="totalKeseluruhan">Rp 0</td>
              <td></td>
            </tr>
          </tfoot>
        </table>
      </div>

      <button class="btn btn-total" onclick="hitungTotalKeseluruhan()">
        🧮 TOTALKAN KESELURUHAN
      </button>

      <button class="btn btn-pdf" onclick="downloadPDF()">
        📥 DOWNLOAD PDF (Multi-Halaman)
      </button>

      <button class="btn btn-hapus" onclick="hapusSemua()">
        🗑️ HAPUS SEMUA DATA
      </button>
    </div>

    <script>
      let data = JSON.parse(localStorage.getItem("borongan")) || [];
      const rupiah = (n) => "Rp " + Number(n).toLocaleString("id-ID");

      // Set tanggal hari ini secara default
      document.getElementById("tanggal").value = new Date()
        .toISOString()
        .slice(0, 10);

      function hariTanggal(t) {
        const d = new Date(t);
        return d.toLocaleDateString("id-ID", {
          weekday: "long",
          day: "numeric",
          month: "short",
          year: "numeric",
        });
      }

      function tambah() {
        const ukuranEl = document.getElementById("ukuran");
        const hasilEl = document.getElementById("hasil");
        const tanggalEl = document.getElementById("tanggal");

        if (!ukuranEl.value || !hasilEl.value) {
          alert("Lengkapi data!");
          return;
        }

        const harga = Number(
          ukuranEl.options[ukuranEl.selectedIndex].dataset.harga,
        );
        const tanggalInput = tanggalEl.value;
        const total = harga * hasilEl.value;

        data.push({
          tanggal: tanggalInput,
          ukuran: ukuranEl.value,
          harga,
          hasil: Number(hasilEl.value),
          total,
        });

        localStorage.setItem("borongan", JSON.stringify(data));
        ukuranEl.value = "";
        hasilEl.value = "";
        document.getElementById("tfootTotal").style.display = "none";
        render();
      }

      function hapus(i) {
        data.splice(i, 1);
        localStorage.setItem("borongan", JSON.stringify(data));
        render();
      }

      function hapusSemua() {
        if (!data.length) return alert("Data sudah kosong!");
        if (confirm("Yakin ingin menghapus SEMUA data?")) {
          data = [];
          localStorage.removeItem("borongan");
          render();
          document.getElementById("tfootTotal").style.display = "none";
        }
      }

      function render() {
        const tabel = document.getElementById("tabel");
        tabel.innerHTML = "";

        const group = {};
        data.forEach((item) => {
          if (!group[item.tanggal]) group[item.tanggal] = [];
          group[item.tanggal].push(item);
        });

        Object.keys(group)
          .sort()
          .forEach((tgl) => {
            let totalH = 0;
            tabel.innerHTML += `<tr class="tanggal-row"><td colspan="5">${hariTanggal(tgl)}</td></tr>`;

            group[tgl].forEach((d) => {
              totalH += d.total;
              // Mencari index asli untuk fungsi hapus
              const indexAsli = data.indexOf(d);
              tabel.innerHTML += `
              <tr>
                <td>${d.ukuran}</td>
                <td>${rupiah(d.harga)}</td>
                <td>${d.hasil}</td>
                <td>${rupiah(d.total)}</td>
                <td><button class="btn-del" onclick="hapus(${indexAsli})">Hapus</button></td>
              </tr>`;
            });

            tabel.innerHTML += `
            <tr class="total-harian">
              <td colspan="3">TOTAL PER HARI</td>
              <td>${rupiah(totalH)}</td>
              <td></td>
            </tr>`;
          });
      }

      function hitungTotalKeseluruhan() {
        const total = data.reduce((a, b) => a + b.total, 0);
        document.getElementById("totalKeseluruhan").innerText = rupiah(total);
        document.getElementById("tfootTotal").style.display =
          "table-footer-group";
      }

      function downloadPDF() {
        if (!data.length) return alert("Data kosong!");

        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();

        doc.setFontSize(16);
        doc.text("LAPORAN KERJA BORONGAN", 105, 15, { align: "center" });

        // Menyiapkan baris untuk tabel PDF
        const rows = [];
        const group = {};
        let grandTotal = 0;

        data.forEach((d) => {
          if (!group[d.tanggal]) group[d.tanggal] = [];
          group[d.tanggal].push(d);
        });

        Object.keys(group)
          .sort()
          .forEach((tgl) => {
            let harian = 0;
            // Tambah baris Tanggal
            rows.push([
              {
                content: hariTanggal(tgl),
                colSpan: 4,
                styles: { fillColor: [238, 243, 255], fontStyle: "bold" },
              },
            ]);

            group[tgl].forEach((item) => {
              harian += item.total;
              grandTotal += item.total;
              rows.push([
                item.ukuran,
                rupiah(item.harga),
                item.hasil.toString(),
                rupiah(item.total),
              ]);
            });

            // Tambah baris Total Harian
            rows.push([
              {
                content: "TOTAL PER HARI",
                colSpan: 3,
                styles: { fontStyle: "bold", halign: "right" },
              },
              { content: rupiah(harian), styles: { fontStyle: "bold" } },
            ]);
          });

        // Tambah Grand Total di akhir
        rows.push([
          {
            content: "TOTAL KESELURUHAN",
            colSpan: 3,
            styles: {
              fillColor: [40, 167, 69],
              textColor: 255,
              fontStyle: "bold",
              halign: "right",
            },
          },
          {
            content: rupiah(grandTotal),
            styles: {
              fillColor: [40, 167, 69],
              textColor: 255,
              fontStyle: "bold",
            },
          },
        ]);

        // Generate Table
        doc.autoTable({
          head: [["Ukuran", "Harga", "Jumlah", "Total"]],
          body: rows,
          startY: 25,
          theme: "grid",
          headStyles: { fillColor: [30, 60, 114], halign: "center" },
          columnStyles: {
            0: { halign: "center" },
            1: { halign: "center" },
            2: { halign: "center" },
            3: { halign: "center" },
          },
          margin: { top: 25 },
        });

        doc.save("Laporan_Borongan_Arief.pdf");
      }

      render();
    </script>
  </body>
</html>
