<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <title>Dashboard Kerja Borongan Arief</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
      * {
        box-sizing: border-box;
      }
      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: #f4f6f8;
        padding: 12px;
      }
      .container {
        max-width: 1100px;
        margin: auto;
        background: #fff;
        padding: 20px;
        border-radius: 14px;
      }
      h1 {
        text-align: center;
        color: #1e3c72;
      }
      .form {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 10px;
        margin-bottom: 20px;
      }
      .form input,
      .form select,
      .form button {
        padding: 12px;
        border-radius: 10px;
        border: 1px solid #ccc;
      }
      .form button {
        background: #1e3c72;
        color: #fff;
        font-weight: bold;
        cursor: pointer;
      }

      /* Tampilan Tabel Sesuai Gambar */
      .table-wrapper {
        overflow: auto;
        margin-top: 15px;
        border: 1px solid #ccc;
        border-radius: 10px;
      }
      table {
        width: 100%;
        border-collapse: collapse;
      }
      thead th {
        background: #2c4a86; /* Warna biru gelap sesuai gambar */
        color: #fff;
        padding: 12px;
        font-size: 14px;
        text-align: center;
      }
      td {
        padding: 10px;
        font-size: 13px;
        text-align: center;
        border-bottom: 1px solid #eee;
      }

      /* Baris Tanggal - Tengah & Bold */
      .tanggal-row {
        background: #f0f4ff;
        font-weight: bold;
      }
      .tanggal-row td {
        text-align: center;
        color: #000;
        padding: 8px;
      }

      /* Baris Total Per Hari - Bold & Align */
      .total-harian {
        background: #fff;
        font-weight: bold;
      }
      .total-harian td:first-child {
        text-align: left;
        padding-left: 15%;
      }

      /* Tombol Hapus Merah */
      .btn-del {
        background: #e74c3c;
        color: #fff;
        border: none;
        padding: 6px 15px;
        border-radius: 6px;
        cursor: pointer;
        font-weight: bold;
      }

      /* Button Utama */
      .btn {
        width: 100%;
        padding: 14px;
        margin-top: 10px;
        border: none;
        border-radius: 12px;
        font-weight: bold;
        cursor: pointer;
      }
      .btn-total {
        background: #0c7c59;
        color: #fff;
      }
      .btn-pdf {
        background: #34495e;
        color: #fff;
      }
      .btn-hapus {
        background: #c0392b;
        color: #fff;
      }

      /* PDF AREA (Hidden) */
      #pdfArea {
        position: absolute;
        left: -9999px;
        width: 800px;
        background: #fff;
        padding: 20px;
      }
      #pdfArea table,
      #pdfArea th,
      #pdfArea td {
        border: 1px solid #333;
      }

      @media (max-width: 600px) {
        .form {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h1>📊 Dashboard Kerja Borongan</h1>

      <div class="form">
        <input type="date" id="tanggal" />
        <select id="ukuran">
          <option value="">Pilih Ukuran</option>
          <option data-harga="10.5">45–54 cm</option>
          <option data-harga="11.4">55–64 cm</option>
          <option data-harga="12.6">65–74 cm</option>
          <option data-harga="13.6">75–84 cm</option>
          <option data-harga="17">85–94 cm</option>
        </select>
        <input type="number" id="hasil" placeholder="Jumlah" />
        <button onclick="tambah()">Tambah</button>
      </div>

      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th style="width: 25%">Ukuran</th>
              <th style="width: 20%">Harga</th>
              <th style="width: 15%">Jumlah</th>
              <th style="width: 25%">Total</th>
              <th style="width: 15%">Aksi</th>
            </tr>
          </thead>
          <tbody id="tabel"></tbody>
          <tfoot
            id="tfootTotal"
            style="display: none; background: #e9f7ef; font-weight: bold"
          >
            <tr>
              <td colspan="3">TOTAL KESELURUHAN</td>
              <td id="totalKeseluruhan">Rp 0</td>
              <td></td>
            </tr>
          </tfoot>
        </table>
      </div>

      <button class="btn btn-total" onclick="hitungTotalKeseluruhan()">
        🧮 TOTALKAN KESELURUHAN
      </button>
      <button class="btn btn-pdf" onclick="downloadPDF()">
        📥 DOWNLOAD PDF PER HALAMAN
      </button>
      <button class="btn btn-hapus" onclick="hapusSemua()">
        🗑️ HAPUS SEMUA DATA
      </button>
    </div>

    <div id="pdfArea">
      <h2 style="text-align: center">LAPORAN KERJA BORONGAN</h2>
      <p id="pdfTanggalKet" style="text-align: center; font-weight: bold"></p>
      <table>
        <thead>
          <tr>
            <th>Ukuran</th>
            <th>Harga</th>
            <th>Jumlah</th>
            <th>Total</th>
          </tr>
        </thead>
        <tbody id="pdfTabel"></tbody>
      </table>
      <p style="text-align: right; font-weight: bold">
        Grand Total: <span id="pdfTotal"></span>
      </p>
    </div>

    <script>
      let data = JSON.parse(localStorage.getItem("borongan")) || [];
      const rupiah = (n) => "Rp " + Number(n).toLocaleString("id-ID");

      document.getElementById("tanggal").value = new Date()
        .toISOString()
        .slice(0, 10);

      function hariTanggal(t) {
        const h = [
          "Minggu",
          "Senin",
          "Selasa",
          "Rabu",
          "Kamis",
          "Jumat",
          "Sabtu",
        ];
        const b = [
          "Jan",
          "Feb",
          "Mar",
          "Apr",
          "Mei",
          "Jun",
          "Jul",
          "Agu",
          "Sep",
          "Okt",
          "Nov",
          "Des",
        ];
        const d = new Date(t);
        return `${h[d.getDay()]}, ${d.getDate()} ${b[d.getMonth()]} ${d.getFullYear()}`;
      }

      function tambah() {
        const u = document.getElementById("ukuran");
        const h = document.getElementById("hasil");
        if (!u.value || !h.value) return alert("Lengkapi data!");

        const harga = Number(u.options[u.selectedIndex].dataset.harga);
        data.push({
          tanggal: document.getElementById("tanggal").value,
          ukuran: u.value,
          harga: harga,
          hasil: Number(h.value),
          total: harga * Number(h.value),
        });

        localStorage.setItem("borongan", JSON.stringify(data));
        u.value = "";
        h.value = "";
        render();
      }

      function hapus(i) {
        data.splice(i, 1);
        localStorage.setItem("borongan", JSON.stringify(data));
        render();
      }

      function hapusSemua() {
        if (confirm("Hapus semua data?")) {
          data = [];
          localStorage.removeItem("borongan");
          render();
        }
      }

      function render() {
        const t = document.getElementById("tabel");
        t.innerHTML = "";
        const group = {};
        data.forEach((d) => {
          if (!group[d.tanggal]) group[d.tanggal] = [];
          group[d.tanggal].push(d);
        });

        Object.keys(group)
          .sort()
          .forEach((tgl) => {
            let totalH = 0;
            t.innerHTML += `<tr class="tanggal-row"><td colspan="5">${hariTanggal(tgl)}</td></tr>`;

            group[tgl].forEach((d) => {
              totalH += d.total;
              t.innerHTML += `
              <tr>
                <td>${d.ukuran}</td>
                <td>${rupiah(d.harga)}</td>
                <td>${d.hasil}</td>
                <td>${rupiah(d.total)}</td>
                <td><button class="btn-del" onclick="hapus(${data.indexOf(d)})">Hapus</button></td>
              </tr>`;
            });

            t.innerHTML += `
            <tr class="total-harian">
              <td colspan="3">TOTAL PER HARI</td>
              <td>${rupiah(totalH)}</td>
              <td></td>
            </tr>`;
          });
      }

      function hitungTotalKeseluruhan() {
        const total = data.reduce((a, b) => a + b.total, 0);
        document.getElementById("totalKeseluruhan").innerText = rupiah(total);
        document.getElementById("tfootTotal").style.display =
          "table-footer-group";
      }

      async function downloadPDF() {
        if (!data.length) return alert("Data kosong!");
        const { jsPDF } = window.jspdf;
        const pdf = new jsPDF("p", "mm", "a4");
        const group = {};
        let grand = 0;

        data.forEach((d) => {
          if (!group[d.tanggal]) group[d.tanggal] = [];
          group[d.tanggal].push(d);
          grand += d.total;
        });

        const sortedDates = Object.keys(group).sort();
        for (let i = 0; i < sortedDates.length; i++) {
          const tgl = sortedDates[i];
          let harian = 0;
          document.getElementById("pdfTabel").innerHTML = "";
          document.getElementById("pdfTanggalKet").innerText = hariTanggal(tgl);

          group[tgl].forEach((d) => {
            harian += d.total;
            document.getElementById("pdfTabel").innerHTML += `
              <tr><td>${d.ukuran}</td><td>${rupiah(d.harga)}</td><td>${d.hasil}</td><td>${rupiah(d.total)}</td></tr>`;
          });

          document.getElementById("pdfTabel").innerHTML +=
            `<tr><td colspan="3"><b>TOTAL HARI INI</b></td><td><b>${rupiah(harian)}</b></td></tr>`;
          document.getElementById("pdfTotal").innerText = rupiah(grand);

          if (i > 0) pdf.addPage();
          const canvas = await html2canvas(document.getElementById("pdfArea"), {
            scale: 2,
          });
          const imgData = canvas.toDataURL("image/png");
          pdf.addImage(
            imgData,
            "PNG",
            10,
            10,
            190,
            (canvas.height * 190) / canvas.width,
          );
        }
        pdf.save("Laporan_Borongan.pdf");
      }

      render();
    </script>
  </body>
</html>
